version: "3.8"

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: byx-prometheus
    restart: unless-stopped
    ports:
      - "19090:9090"
    environment:
      # Ajuste o alvo de métricas do CometBFT se sua porta/host forem diferentes.
      - COMET_METRICS_TARGET=${COMET_METRICS_TARGET:-host.docker.internal:26660}
      # Ajuste o alvo de métricas do app (telemetry) se exposto separadamente.
      - APP_METRICS_TARGET=${APP_METRICS_TARGET:-host.docker.internal:26660}
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:10.4.3
    container_name: byx-grafana
    restart: unless-stopped
    ports:
      - "13000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  prometheus_data:
  grafana_data:
