syntax = "proto3";
package byx.certificados.module.v1;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "byx/x/certificados/types";

// Module is the config object for the certificados module.
message Module {
  option (cosmos.app.v1alpha1.module) = {go_import: "byx/x/certificados"};

  // authority defines the custom module authority.
  // If not set, defaults to the governance module.
  string authority = 1;
}
