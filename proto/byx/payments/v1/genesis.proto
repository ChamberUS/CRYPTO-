syntax = "proto3";
package byx.payments.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "byx/payments/v1/params.proto";
import "byx/payments/v1/payment.proto";

option go_package = "byx/x/payments/types";

// GenesisState defines the payments module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  repeated PaymentRequest payment_requests = 2 [(gogoproto.nullable) = false];
  uint64 payment_request_count = 3;
}
