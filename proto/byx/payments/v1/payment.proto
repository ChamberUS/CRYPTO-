syntax = "proto3";
package byx.payments.v1;

import "gogoproto/gogo.proto";
import "cosmos_proto/cosmos.proto";

option go_package = "byx/x/payments/types";

// PaymentStatus indica o estado do pedido de pagamento.
enum PaymentStatus {
  PAYMENT_STATUS_UNSPECIFIED = 0;
  PAYMENT_STATUS_PENDING = 1;
  PAYMENT_STATUS_PAID = 2;
  PAYMENT_STATUS_EXPIRED = 3;
  PAYMENT_STATUS_CANCELED = 4;
}

// PaymentRequest representa um pedido de pagamento criado por uma loja.
message PaymentRequest {
  uint64 id = 1;
  uint64 loja_id = 2;
  uint64 amount_microbyx = 3;
  string memo = 4;
  PaymentStatus status = 5;
  uint64 created_at_unix = 6;
  uint64 expires_at_unix = 7;
  string payer = 8 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 paid_at_unix = 9;
}
